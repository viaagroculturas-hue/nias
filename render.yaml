services:
  - type: web
    name: nias
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    envVars:
      - key: PORT
        value: 8080
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: NIAS_DATA_DIR
        value: /opt/render/project/src/data
      - key: NIAS_DB_PATH
        value: /opt/render/project/src/data/nia_flv.db
      - key: NIAS_PIPELINE_STATUS_PATH
        value: /opt/render/project/src/data/pipeline_status.json
      - key: NIAS_SCHEDULER_LOG_PATH
        value: /opt/render/project/src/data/scheduler.log
    disk:
      name: nias-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
