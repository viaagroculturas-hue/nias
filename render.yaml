services:
  - type: web
    name: nias
    env: python
    buildCommand: pip install --upgrade pip
    startCommand: python server_v2.py
    envVars:
      - key: PORT
        value: 8000
      - key: NIAS_API_KEY
        sync: false   # definir manualmente no dashboard Render
      - key: PYTHON_VERSION
        value: 3.11.0
